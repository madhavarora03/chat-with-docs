name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: chat-with-docs
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d chat-with-docs"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ENV: test
      POSTGRES_HOST: localhost
      POSTGRES_DB: chat-with-docs
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: testpassword
      POSTGRES_PORT: 5432
      JWT_ACCESS_SECRET: ci-test-secret-key-not-for-production
      JWT_ACCESS_EXPIRES_MINUTES: 60
      JWT_ALGORITHM: HS256
      REFRESH_TOKEN_BYTES: 32
      REFRESH_TOKEN_EXPIRES_DAYS: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create test database
        run: PGPASSWORD=$POSTGRES_PASSWORD psql -h localhost -U $POSTGRES_USER -d $POSTGRES_DB -c "CREATE DATABASE chat_with_docs_test;"

      - name: Run tests with coverage
        run: pytest --cov-report=xml

      - name: Upload coverage to Codecov
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
